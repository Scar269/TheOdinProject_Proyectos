<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="container">
        <div class="izquierda">
            <img src="resources/lilybackground.jpg" alt="" class="fondo">
            <div class="logo-overlay">
                <img src="resources/logo.png" alt="Odin logo">
                <h1>ODIN</h1>
            </div>
        </div>

        <div class="derecha">
            <div class="form-header">
                <h1>This is not a real online service! You know you need something<br>like this in your life to help you realize your deepest dreams.<br>
                Sign up <i>now</i> to get started.</h1>
                <br>
                <h1>You <i>know</i> you want to</h1>
            </div>
            <form action="#" method="GET">
                <h2>Let's do this!</h2>
                <div>
                        <label for="first_name">First Name:</label>
                        <input type="text" id="first_name">
                        <label for="last_name">Last Name:</label>
                        <input type="text" id="last_name">
                    <br>
                        <label for="user_email">Email:</label>
                        <input type="email" id="user_email" name="email" placeholder="you@example.com">
                        <label for="phone_number">Phone Number:</label>
                        <input type="tel" id="phone_number" name="phone_number">
                    <br>
                        <label for="user_password">Password:</label>
                        <input type="password" id="user_password" name="password">
                        <label for="confirm_password">Confirm Password:</label>
                        <input type="password" id="confirm_password" name="password">
                </div>
                <button type="submit">Create Account</button>
                <p>Already have an account? <span>Log in</span></p>
            </form>
        </div>
    </div>
</body>
</html>
